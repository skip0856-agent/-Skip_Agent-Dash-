<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Detail Direct — Dashboard (Preview)</title>
<link rel="manifest" href="/manifest.json">
<style>
:root{--bg:#f6f9fb;--card:#ffffff;--muted:#6b7280;--text:#0b2545;--accent:#2563eb;--surface:#f8fafc}
body{font-family:Inter,Segoe UI,Arial;background:var(--bg);color:var(--text);margin:0;padding:18px}
.container{max-width:1100px;margin:0 auto}
.toprow{display:flex;align-items:center;justify-content:space-between;gap:12px}
h1{font-size:20px;margin:0}
.small-muted{color:var(--muted)}
.header-actions{display:flex;gap:8px}
.btn{background:var(--accent);color:#fff;padding:10px 14px;border-radius:10px;border:none;cursor:pointer;box-shadow:0 6px 18px rgba(9,30,66,0.08);transition:transform .12s ease,box-shadow .12s ease,background-color .12s ease}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(9,30,66,0.12)}
.btn:active{transform:translateY(0);box-shadow:0 6px 18px rgba(9,30,66,0.06)}
.btn.ghost{background:transparent;color:var(--text);border:1px solid rgba(11,37,69,0.06);box-shadow:none}
.btn.ghost:hover{background:rgba(11,37,69,0.03)}
.card{background:var(--card);border-radius:12px;padding:12px;border:1px solid rgba(11,37,69,0.06);box-shadow:0 6px 18px rgba(11,37,69,0.04)}
.task-card{background:var(--card);border-radius:10px;padding:14px;border:1px solid #eef8fb;box-shadow:0 6px 18px rgba(11,37,69,0.04);display:flex;justify-content:space-between;align-items:flex-start}
.chip{background:var(--surface);color:var(--text);padding:6px 10px;border-radius:999px;font-size:12px}
/* sticky header */
.sticky-header{position:sticky;top:0;background:linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0.8));backdrop-filter:blur(6px);padding:10px;border-radius:8px;box-shadow:0 6px 18px rgba(11,37,69,0.04);z-index:40}
/* sticky actions (mobile) */
#stickyActions{display:none}

/* dark theme */
.dark{--bg:#0b1220;--card:#0e1624;--muted:#9aa7b2;--text:#dbeafe;--accent:#60a5fa;--surface:#11202b}
</style>
<style>
/* Responsive: stack columns on small screens */
@media (max-width: 900px){
  .three-col{grid-template-columns:1fr !important}
  #leftSidebar, #rightPanel{display:none}
  #bottomBuckets{display:flex;position:fixed;left:10px;right:10px;bottom:12px;gap:8px;justify-content:space-between;padding:8px;background:rgba(0,0,0,0.35);backdrop-filter:blur(6px);border-radius:12px}
  #taskList .task-card{padding:18px}
}
/* bottom buckets default hidden on desktop */
#bottomBuckets{display:none}
</style>
<!-- Supabase JS (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // REPLACE these values after you create your Supabase project
  window.SUPABASE_URL = 'https://cacdktyjmtpwwdiicqji.supabase.co';
  window.SUPABASE_ANON_KEY = 'sb_publishable_ncknVGwCabhk3zoxfKJoHw_RkqeMOtY';
  window.supabase = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
</script>
</head>
<body>
<div class="container">
  <div class="toprow sticky-header">
    <div>
      <h1>Skip Dashboard</h1>
    </div>
    <div class="header-actions">
      <input id="search" placeholder="Search tasks, projects, people, notes..." style="padding:8px;border-radius:8px;border:1px solid rgba(11,37,69,0.06)">
      <button id="themeToggle" class="btn ghost">Dark</button>
      <button id="addTop" class="btn">+ Add Task</button>
    </div>
  </div>

  <div id="authArea"></div>
  <div id="appArea" style="display:none; margin-top:12px">
    <div class="three-col" style="display:grid;grid-template-columns:240px 1fr 320px;gap:16px">
      <aside id="leftSidebar" class="card" style="height:fit-content">
        <!-- buckets will render here -->
        <strong>Buckets</strong>
        <div id="bucketList" style="margin-top:8px">Loading buckets...</div>
      </aside>

      <main style="min-width:0">
        <div class="card" style="margin-bottom:12px"><strong id="mainTitle">Today</strong></div>
        <div id="taskList">Loading...</div>
        <div id="completedContainer" style="margin-top:18px"></div>
      </main>

      <aside id="rightPanel" class="card">
        <strong>Mission Control</strong>
        <div id="mcWidgets" style="margin-top:8px">(metrics coming soon)</div>
      </aside>
    </div>
  </div>

  <!-- Mobile bottom bucket bar (visible only on small screens) -->
  <div id="bottomBuckets"></div>

<script>
// theme toggle
(function(){ const btn=document.getElementById('themeToggle'); const root=document.documentElement; const stored=localStorage.getItem('theme'); if(stored==='dark'){ root.classList.add('dark'); btn.textContent='Light'; }
 btn.addEventListener('click', ()=>{ if(root.classList.toggle('dark')){ btn.textContent='Light'; localStorage.setItem('theme','dark')} else { btn.textContent='Dark'; localStorage.setItem('theme','light') } });})();
</script>
  <!-- Mobile sticky actions (visible on small screens) -->
  <div id="stickyActions" style="display:none;position:fixed;left:12px;right:12px;bottom:72px;display:flex;gap:8px;justify-content:space-between;padding:8px;z-index:50">
    <button id="mobileNew" class="btn">+ New</button>
    <button id="mobileMC" class="btn ghost">Mission</button>
    <button id="mobileBuckets" class="btn ghost">Buckets</button>
  </div>
</div>
<script src="/app.supabase.js"></script>
</body>
</html>
